name: Notify go

# On every push to main, ping the central aggregator (Malcolmston/go) so it can
# bump its submodule pointer to this new commit and re-validate the workspace.
# Requires a repo secret GO_SYNC_TOKEN (a token with contents:write on
# Malcolmston/go). Without it this step no-ops, and go still catches up via its
# hourly scheduled sync.

on:
  push:
    branches: [main]

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger go submodule sync
        env:
          TOKEN: ${{ secrets.GO_SYNC_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "GO_SYNC_TOKEN not set — skipping instant sync (go will catch up on its hourly schedule)."
            exit 0
          fi
          curl -sSf -X POST \
            -H "Authorization: Bearer $TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/Malcolmston/go/dispatches \
            -d "{\"event_type\":\"library-updated\",\"client_payload\":{\"repo\":\"${{ github.repository }}\",\"sha\":\"${{ github.sha }}\"}}"
