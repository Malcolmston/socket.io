name: Web unit

# Vitest component tests for the landing site (web/) and its vendored go-ui
# shared library (a git submodule).

on:
  pull_request:
    paths: ["web/**", ".github/workflows/web-unit.yml"]
  push:
    branches: ["main"]
    paths: ["web/**", ".github/workflows/web-unit.yml"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  vitest:
    name: Vitest component tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { submodules: true }
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install
        working-directory: web
        run: npm ci
      - name: Typecheck
        working-directory: web
        run: npm run typecheck && npm run typecheck:tests
      - name: Unit tests
        working-directory: web
        run: npm run test
