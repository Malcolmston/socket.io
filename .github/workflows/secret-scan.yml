name: Secret scan

# Scans the full history and every push/PR for committed secrets (API keys,
# tokens, private keys) with Gitleaks. Complements GitHub's native secret
# scanning and the GitGuardian check.

on:
  push:
    branches: ["main"]
  pull_request:
  schedule:
    - cron: "0 6 * * 2"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
