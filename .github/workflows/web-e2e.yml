name: Web e2e

# Playwright end-to-end tests for the landing site across the device matrix.
# Generates the API doc.json first so the docs tab has content.

on:
  pull_request:
    paths: ["web/**", ".github/workflows/web-e2e.yml"]
  push:
    branches: ["main"]
    paths: ["web/**", ".github/workflows/web-e2e.yml"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  playwright:
    name: Playwright E2E (device matrix)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { submodules: true }
      - uses: actions/setup-go@v6
        with: { go-version: "1.24", cache: true }
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install deps
        working-directory: web
        run: npm ci
      - name: Install Playwright chromium
        working-directory: web
        run: npx playwright install --with-deps chromium
      - name: Run E2E
        working-directory: web
        run: npx playwright test
      - name: Upload report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 7
