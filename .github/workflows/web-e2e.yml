name: Web e2e

# Playwright end-to-end tests for the landing site across the device matrix.
# Sharded across 4 parallel runners to cut wall-clock time; each shard also
# runs its slice with the configured worker count.

on:
  pull_request:
    paths: ["web/**", ".github/workflows/web-e2e.yml"]
  push:
    branches: ["main"]
    paths: ["web/**", ".github/workflows/web-e2e.yml"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  playwright:
    name: Playwright E2E (shard ${{ matrix.shard }}/4)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@v4
        with: { submodules: true }
      - uses: actions/setup-go@v5
        with: { go-version: "1.24", cache: true }
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install deps
        working-directory: web
        run: npm ci
      - name: Install Playwright chromium
        working-directory: web
        run: npx playwright install --with-deps chromium
      - name: Run E2E (shard ${{ matrix.shard }}/4)
        working-directory: web
        run: npx playwright test --shard=${{ matrix.shard }}/4
      - name: Upload report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-shard-${{ matrix.shard }}
          path: web/playwright-report/
          retention-days: 7
