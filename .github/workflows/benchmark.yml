name: Benchmarks

# Advisory benchmark run on PRs. Never blocks a merge; the numbers are uploaded
# as an artifact so perf regressions in the ports stay visible.

on:
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  bench:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true
      - name: Run benchmarks
        run: go test -run '^$' -bench=. -benchmem ./... | tee bench.txt
      - name: Upload results
        uses: actions/upload-artifact@v7
        with:
          name: benchmarks
          path: bench.txt
          if-no-files-found: ignore
