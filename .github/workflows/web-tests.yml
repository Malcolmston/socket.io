name: Web tests

# Unit (Vitest) + E2E (Playwright) tests for the landing site in web/, which
# vendors the shared go-ui component library as a git submodule under
# web/vendor/go. Runs on PRs and pushes to main that touch web/, and on manual
# dispatch.

on:
  pull_request:
    paths:
      - "web/**"
      - ".github/workflows/web-tests.yml"
  push:
    branches: ["main"]
    paths:
      - "web/**"
      - ".github/workflows/web-tests.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  unit:
    name: Vitest component tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Run component tests
        working-directory: web
        run: npm run test

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Install Playwright chromium
        working-directory: web
        run: npx playwright install --with-deps chromium

      - name: Build site
        working-directory: web
        run: npm run build

      - name: Run E2E tests
        working-directory: web
        run: npx playwright test

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 7
