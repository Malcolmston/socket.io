name: Release

# Cuts a version tag + GitHub Release whenever the VERSION file changes on main.
# Tags and releases are created server-side by the runner (with the built-in
# GITHUB_TOKEN), so no local tag push is required. A moving `stable` tag always
# points at the most recent release, and the release is flagged as `latest`.
#
# To cut a new release: bump the number in VERSION, commit, and push to main.

on:
  push:
    branches: ["main"]
    paths: ["VERSION"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "release"
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cut tag and release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          VER="$(tr -d '[:space:]' < VERSION)"
          if [ -z "$VER" ]; then echo "VERSION is empty"; exit 1; fi
          TAG="v$VER"
          echo "Release tag: $TAG"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists — nothing to do."
          else
            if ! git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
              git tag -a "$TAG" -m "$TAG"
              git push origin "$TAG"
            fi
            gh release create "$TAG" \
              --title "$TAG" \
              --generate-notes \
              --latest
            echo "Created release $TAG"
          fi

          # Maintain a moving `stable` tag pointing at the latest release commit.
          git tag -f stable "$TAG^{commit}"
          git push -f origin stable
          echo "stable -> $TAG"
