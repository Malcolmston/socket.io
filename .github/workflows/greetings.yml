name: Greetings

# Welcomes first-time contributors on their first issue or pull request.
# A no-op for returning contributors.

on:
  pull_request_target:
    types: [opened]
  issues:
    types: [opened]

permissions:
  issues: write
  pull-requests: write

jobs:
  greeting:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: >
            Thanks for opening your first issue here! A maintainer will take a
            look shortly. 👋
          pr-message: >
            Thanks for your first pull request! Please make sure the test
            workflows pass — a maintainer will review it soon. 🎉
