name: CI failure to issue

# Opens (or comments on) an issue when a scheduled or main-branch workflow fails,
# so red runs that aren't attached to a PR don't get lost. PR failures are shown
# on the PR itself and are skipped here.

on:
  workflow_run:
    workflows:
      - "Race (nightly)"
      - "Supply chain"
      - "Secret scan"
      - "Govulncheck"
      - "SBOM"
      - "Library tests"
      - "Workspace"
      - "Sync submodules"
      - "Pages"
      - "Release"
      - "Scan to issue"
    types: [completed]

permissions:
  issues: write
  actions: read

jobs:
  file:
    if: ${{ github.event.workflow_run.conclusion == 'failure' && github.event.workflow_run.event != 'pull_request' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const run = context.payload.workflow_run;
            const { owner, repo } = context.repo;
            const label = 'ci-failure';
            try { await github.rest.issues.getLabel({ owner, repo, name: label }); }
            catch { await github.rest.issues.createLabel({ owner, repo, name: label, color: 'd93f0b', description: 'A scheduled or main-branch workflow failed' }); }
            const title = `CI failure: ${run.name} (${run.head_branch})`;
            const open = (await github.rest.issues.listForRepo({ owner, repo, state: 'open', labels: label })).data
              .filter(i => i.title === title);
            const details = `- Commit: \`${run.head_sha}\`\n- Event: \`${run.event}\`\n- [View run](${run.html_url})`;
            if (open.length) {
              await github.rest.issues.createComment({ owner, repo, issue_number: open[0].number, body: `Failed again.\n\n${details}` });
            } else {
              await github.rest.issues.create({ owner, repo, title, labels: [label],
                body: `Workflow **${run.name}** failed on \`${run.head_branch}\`.\n\n${details}\n\n_Filed automatically by CI failure to issue._` });
            }
