version: "2"
run:
  timeout: 5m
linters:
  default: standard
  settings:
    errcheck:
      exclude-functions:
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
        - fmt.Sscanf
        - (*strings.Builder).WriteString
        - (*strings.Builder).WriteByte
        - (*strings.Builder).WriteRune
        - (net/http.ResponseWriter).Write
        - (io.Closer).Close
        - (io.ReadCloser).Close
        - (*os.File).Close
        - (net.Conn).Close
        - crypto/rand.Read
        - math/rand.Read
    staticcheck:
      checks: ["all", "-QF1001", "-QF1002", "-QF1003", "-QF1006", "-QF1008", "-QF1011", "-ST1000", "-ST1003", "-ST1023"]
  exclusions:
    rules:
      - path: _test\.go
        linters: [errcheck]
      - path: (docs/gen|examples)/
        linters: [errcheck, staticcheck, unused]
